apiVersion: v1
kind: Service
metadata:
  name: {{ include "koreader-sync-server.fullname" . }}
  labels:
    {{- include "koreader-sync-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "koreader-sync-server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      appProtocol: http
    - name: https
      port: {{ .Values.service.httpsPort }}
      targetPort: https
      protocol: TCP
      appProtocol: https
